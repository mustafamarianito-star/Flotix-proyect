@if (currentUser(); as user) {
  <div class="shell">
    <header class="topbar">
      <a routerLink="/dashboard" class="brand" aria-label="Flotix — inicio">
        <img src="assets/flotix-app-icon-square.svg" alt="" class="brand-mark" />
        <span class="brand-word">Flotix</span>
      </a>

      <nav class="nav">
        <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
        <a routerLink="/combustible" routerLinkActive="active">Combustible</a>
        <a routerLink="/vehiculos" routerLinkActive="active">Vehículos</a>
        <a routerLink="/choferes" routerLinkActive="active">Choferes</a>
        <a routerLink="/rendiciones" routerLinkActive="active">Rendiciones</a>
      </nav>

      <button
        class="icon-btn menu-toggle"
        [matMenuTriggerFor]="navMenu"
        aria-label="Abrir menú de navegación"
      >
        <span class="material-symbols-rounded">menu</span>
      </button>
      <mat-menu #navMenu="matMenu">
        <a mat-menu-item routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
        <a mat-menu-item routerLink="/combustible" routerLinkActive="active">Combustible</a>
        <a mat-menu-item routerLink="/vehiculos" routerLinkActive="active">Vehículos</a>
        <a mat-menu-item routerLink="/choferes" routerLinkActive="active">Choferes</a>
        <a mat-menu-item routerLink="/rendiciones" routerLinkActive="active">Rendiciones</a>
      </mat-menu>

      <span class="spacer"></span>

      <button
        class="icon-btn"
        (click)="toggleTheme()"
        [matTooltip]="theme() === 'dark' ? 'Tema claro' : 'Tema oscuro'"
        aria-label="Cambiar tema"
      >
        <span class="material-symbols-rounded">
          {{ theme() === 'dark' ? 'light_mode' : 'dark_mode' }}
        </span>
      </button>

      <div class="user-chip">
        <span class="avatar">{{ initials(user.name) }}</span>
        <span class="user-name">{{ user.name }}</span>
      </div>

      <a routerLink="/configuracion" class="icon-btn" matTooltip="Preferencias y backup">
        <span class="material-symbols-rounded">settings</span>
      </a>
      <button class="icon-btn" (click)="logout()" matTooltip="Cerrar sesión">
        <span class="material-symbols-rounded">logout</span>
      </button>
    </header>

    <main class="content">
      <router-outlet />
    </main>
  </div>
} @else {
  <router-outlet />
}
